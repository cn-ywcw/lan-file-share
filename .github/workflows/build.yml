name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.21'

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        ext=""
        if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
        output="lan-file-share-${GOOS}-${GOARCH}${ext}"
        go build -ldflags="-s -w" -o "$output" .
        echo "BINARY_NAME=$output" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: lan-file-share-${{ matrix.goos }}-${{ matrix.goarch }}
        path: lan-file-share-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: artifacts
        merge-multiple: true

    - name: Generate version tag
      id: version
      run: |
        VERSION=$(date +v%Y.%m.%d-%H%M%S)
        echo "tag=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"

    - name: Delete existing latest release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete latest -y --cleanup-tag || true

    - name: Create Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest Build"
        files: artifacts/*
        generate_release_notes: false
        make_latest: true
        body: |
          ## Latest Build

          自动构建于 $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          **注意**: 此为自动构建版本，可能包含最新特性但也可能不稳定。

          ### 下载说明
          - `lan-file-share-linux-amd64` - Linux x64
          - `lan-file-share-linux-arm64` - Linux ARM64
          - `lan-file-share-windows-amd64.exe` - Windows x64
          - `lan-file-share-darwin-amd64` - macOS x64 (Intel)
          - `lan-file-share-darwin-arm64` - macOS ARM64 (Apple Silicon)
