<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 — 局域网文件共享</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
        .admin-wrap { max-width: 640px; width: 100%; }
        .admin-card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; margin-bottom: 16px; }
        .admin-card h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .admin-card h3 { font-size: 14px; margin-bottom: 12px; color: var(--text-secondary); border-bottom: 1px solid var(--border); padding-bottom: 6px; }

        /* Status indicator */
        .status-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
        .status-indicator { display: flex; align-items: center; gap: 12px; font-size: 15px; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
        .status-dot.running { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
        .status-dot.paused { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.4); }
        .status-text { font-weight: 600; }
        .status-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        .toggle-btn { font-size: 16px; padding: 12px 32px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; transition: all 0.2s; }
        .toggle-btn.start { background: #22c55e; color: #fff; }
        .toggle-btn.start:hover { background: #16a34a; }
        .toggle-btn.stop { background: #ef4444; color: #fff; }
        .toggle-btn.stop:hover { background: #dc2626; }

        .server-meta { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
        .server-meta strong { color: var(--text); }

        .back-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; }
        .back-link a { color: var(--primary); text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }

        .btn-save { margin-top: 16px; }
        .save-feedback { font-size: 13px; margin-top: 8px; min-height: 20px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .info-grid .info-item { padding: 8px 12px; background: var(--bg); border-radius: var(--radius-sm); }
        .info-grid .info-item label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
        .info-grid .info-item span { font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="admin-wrap">
        <!-- Header -->
        <div class="admin-card" style="text-align:center;padding:24px">
            <h1 style="font-size:22px;margin:0">⚙️ 管理面板</h1>
            <p style="font-size:13px;color:var(--text-secondary);margin-top:4px">局域网文件共享 — 本地管理</p>
        </div>

        <!-- Service Status + Toggle -->
        <div class="admin-card" id="statusCard">
            <h2>🔌 服务状态</h2>
            <div class="status-row">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <div>
                        <div class="status-text" id="statusText">检测中...</div>
                        <div class="status-hint" id="statusHint">正在获取服务状态</div>
                    </div>
                </div>
                <button class="toggle-btn" id="toggleBtn" onclick="toggleService()">⋯</button>
            </div>
        </div>

        <!-- Server Info -->
        <div class="admin-card">
            <h2>🌐 服务信息</h2>
            <div class="info-grid">
                <div class="info-item"><label>服务地址</label><span id="adminServerUrl">-</span></div>
                <div class="info-item"><label>共享目录</label><span id="adminSharedDir">-</span></div>
                <div class="info-item"><label>当前端口</label><span id="adminPort">-</span></div>
                <div class="info-item"><label>认证状态</label><span id="adminAuth">-</span></div>
            </div>
        </div>

        <!-- Settings -->
        <div class="admin-card">
            <h2>🔧 服务设置</h2>

            <h3>🔌 端口</h3>
            <div class="form-group">
                <label>端口号（修改后需重启服务）</label>
                <input type="number" id="settingsPort" min="1024" max="65535" placeholder="8080">
            </div>

            <h3>🔒 访客权限</h3>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">
                当开启认证（<code>--user</code>）后，访客（未登录用户）仅可执行勾选的操作。
                已登录管理员始终拥有全部权限。
            </p>
            <div class="perm-grid" id="permGrid">
                <!-- dynamically rendered from perm_categories -->
            </div>

            <button class="btn btn-primary btn-save" onclick="saveSettings()">💾 保存设置</button>
            <div class="save-feedback" id="saveFeedback"></div>
        </div>

        <!-- Back link -->
        <div class="back-link">
            <a href="/">← 返回共享页面</a>
        </div>
    </div>

    <script>
    // ===== Admin Panel Logic =====

    const API = {
        async get(path) {
            const res = await fetch(path);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        },
        async post(path, body) {
            const res = await fetch(path, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        },
        async put(path, body) {
            const res = await fetch(path, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        },
    };

    let permCategories = [];

    document.addEventListener('DOMContentLoaded', () => {
        loadStatus();
        loadConfig();
        loadPermCategories();
    });

    async function loadStatus() {
        try {
            const data = await API.get('/api/admin/status');
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const hint = document.getElementById('statusHint');
            const btn = document.getElementById('toggleBtn');

            // Check paused state (might not be in older API — check or use data)
            const paused = data.paused === true;
            if (paused) {
                dot.className = 'status-dot paused';
                text.textContent = '已暂停';
                hint.textContent = '文件共享服务已暂停，访客无法访问';
                btn.className = 'toggle-btn start';
                btn.textContent = '▶ 恢复服务';
            } else {
                dot.className = 'status-dot running';
                text.textContent = '运行中';
                hint.textContent = '服务正常运行，所有设备可访问';
                btn.className = 'toggle-btn stop';
                btn.textContent = '⏸ 暂停服务';
            }
        } catch (e) {
            document.getElementById('statusText').textContent = '获取失败';
            document.getElementById('statusHint').textContent = '无法连接管理API：' + e.message;
        }
    }

    async function toggleService() {
        try {
            // Get current state from the DOM
            const isPaused = document.getElementById('statusDot').classList.contains('paused');
            const data = await API.post('/api/admin/toggle', { paused: !isPaused });
            // Reload status
            await loadStatus();
            document.getElementById('saveFeedback').textContent = data.paused ? '⏸️ 服务已暂停' : '▶️ 服务已恢复';
            document.getElementById('saveFeedback').style.color = 'var(--success)';
        } catch (e) {
            document.getElementById('saveFeedback').textContent = '⚠️ 操作失败：' + e.message;
            document.getElementById('saveFeedback').style.color = 'var(--danger)';
        }
    }

    async function loadConfig() {
        try {
            const data = await API.get('/api/admin/config');
            document.getElementById('adminServerUrl').textContent = window.location.host;
            document.getElementById('adminSharedDir').textContent = data.shared_dir || '-';
            document.getElementById('adminPort').textContent = data.port || '-';
            document.getElementById('adminAuth').textContent = data.has_auth ? '已启用 (' + (data.auth_user || '') + ')' : '未启用（开放访问）';
            document.getElementById('settingsPort').value = data.port || '8080';
        } catch (e) {
            document.getElementById('adminServerUrl').textContent = '加载失败';
        }
    }

    async function loadPermCategories() {
        try {
            const data = await API.get('/api/permissions');
            permCategories = data.categories || [];

            // Also fetch current guest permission values
            const config = await API.get('/api/admin/config');
            const currentPerms = config.guest_permissions || {};

            // Build the permission grid
            renderPermGrid(currentPerms);
        } catch (e) {
            document.getElementById('permGrid').innerHTML = '<p style="color:var(--danger);font-size:13px">加载权限配置失败</p>';
        }
    }

    function renderPermGrid(currentPerms) {
        const grid = document.getElementById('permGrid');
        const cats = permCategories.length > 0 ? permCategories : getFallbackCats();

        grid.innerHTML = cats.map(cat => `
            <div class="perm-category">
                <div class="perm-category-header">${cat.icon || '📋'} ${esc(cat.label)}</div>
                <div class="perm-category-entries">
                    ${cat.entries.map(e => {
                        const checked = currentPerms[e.key] !== false;
                        return `<label class="perm-item">
                            <input type="checkbox" id="perm_${e.key}" data-perm="${e.key}" ${checked ? 'checked' : ''}>
                            ${e.icon || ''} ${esc(e.label)}
                        </label>`;
                    }).join('')}
                </div>
            </div>
        `).join('');
    }

    function getFallbackCats() {
        return [
            { id:'browsing', label:'文件浏览', icon:'📂', entries:[{ key:'browse', label:'浏览目录', icon:'📂' }] },
            { id:'operations', label:'文件操作', icon:'📄', entries:[
                { key:'upload', label:'上传文件', icon:'📤' },
                { key:'download', label:'下载文件', icon:'⬇️' },
                { key:'preview', label:'在线预览', icon:'👁️' },
                { key:'delete', label:'删除文件', icon:'🗑️' },
            ]},
            { id:'sharing', label:'分享管理', icon:'🔗', entries:[{ key:'share', label:'创建分享链接', icon:'🔗' }] },
        ];
    }

    async function saveSettings() {
        const feedback = document.getElementById('saveFeedback');
        feedback.textContent = '保存中...';

        const guestPerms = {};
        document.querySelectorAll('#permGrid input[type="checkbox"]').forEach(cb => {
            guestPerms[cb.dataset.perm] = cb.checked;
        });

        try {
            const result = await API.put('/api/admin/config', {
                port: parseInt(document.getElementById('settingsPort').value) || 8080,
                guest_permissions: guestPerms,
            });
            feedback.textContent = '✅ 设置已保存！' + (result.config_saved ? '（已写入配置文件）' : '');
            feedback.style.color = 'var(--success)';
        } catch (e) {
            feedback.textContent = '⚠️ 保存失败：' + e.message;
            feedback.style.color = 'var(--danger)';
        }
    }

    function esc(t) {
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }
    </script>
</body>
</html>
